<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ragibshaikh.in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #f7f8fa, #eef1f4);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   Roboto, Helvetica, Arial, sans-serif;
      color: #2c2c2c;
    }

    .wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      padding: 40px 32px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 18px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      margin: 6px 0;
      color: #555;
    }

    .status {
      margin-top: 22px;
      font-size: 14px;
      font-weight: 500;
      color: #2f7d32;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 9px;
      height: 9px;
      background-color: #2ecc71;
      border-radius: 50%;
      display: inline-block;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="card">
      <h1>ragibshaikh.in</h1>

      <p>This domain is privately reserved.</p>
      <p>No public website or public content is intentionally hosted at this address.</p>

      <div class="status">
        <span class="dot"></span>
        Status: Active
      </div>
    </div>
  </div>
</body>
</html>
